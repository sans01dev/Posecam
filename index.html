<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>무더위 대피 지도 v0.7</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
  body { background: #EAF1F8; overflow: hidden; }

  :root {
    --blue: #2563EB; --blue-dark: #1E40AF; --blue-light: #93C5FD;
    --alert: #F97316; --alert-dark: #EA580C;
    --ink: #17233A; --sub: #5E6E88; --line: #E3E9F2;
    --shadow: 0 4px 16px rgba(30,50,90,.14); --shadow-lg: 0 12px 36px rgba(30,50,90,.18);
  }

  #app { position: relative; width: 100%; height: 100%; }

  /* ===== 지도 (전체 화면) ===== */
  #map { position: absolute; inset: 0; background: #D6E4F0; }

  #nokey { position: absolute; inset: 0; z-index: 5; display: flex; flex-direction: column;
           align-items: center; justify-content: center; gap: 12px; padding: 30px; text-align: center;
           color: var(--sub); background: #EAF1F8; }
  #nokey .big { font-size: 40px; }
  #nokey .t { font-size: 15px; font-weight: 700; line-height: 1.55; color: var(--ink); }
  #nokey code { background:#fff; padding:2px 6px; border-radius:8px; color:var(--blue-dark); font-weight:700; }

  /* ===== 상단 제목바 (제목 + 폭염지수) ===== */
  #titlebar { position: absolute; top: 12px; left: 12px; z-index: 16;
              background: rgba(37,99,235,.74); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
              border-radius: 13px; box-shadow: var(--shadow);
              padding: 8px 13px; display: flex; flex-direction: column; gap: 2px; }
  #titlebar .r1 { display: flex; align-items: center; gap: 5px; }
  #titlebar .e { font-size: 13px; }
  #titlebar .t { font-size: 13px; font-weight: 800; color: #fff; letter-spacing: -.3px; white-space: nowrap; }
  #titlebar .heat { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  #titlebar .temp { font-size: 14px; font-weight: 900; color: #fff; }
  #titlebar .lvl { font-size: 10.5px; font-weight: 800; padding: 1px 7px; border-radius: 7px;
                   background: rgba(255,255,255,.22); color: #fff; }
  #titlebar .lvl.warn { background: #FBBF24; color: #7C2D12; }
  #titlebar .lvl.alert { background: var(--alert); color: #fff; }
  #titlebar .lvl.danger { background: #DC2626; color: #fff; }

  /* ===== 좌측 세로 필터 레일 ===== */
  #filters { position: absolute; left: 12px; top: 78px; z-index: 16;
             display: flex; flex-direction: column; gap: 5px; }
  .chip { width: 46px; padding: 6px 2px; border-radius: 10px; border: none;
          background: rgba(255,255,255,.7); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
          color: var(--sub); font-size: 9.5px; font-weight: 800;
          display: flex; flex-direction: column; align-items: center; gap: 1px; cursor: pointer;
          box-shadow: var(--shadow); transition: all .15s; }
  .chip.on { background: rgba(37,99,235,.85); color: #fff; }
  .chip .e { font-size: 15px; }

  /* ===== 우측 버튼 ===== */
  #binoc { position: absolute; right: 16px; top: 52px; z-index: 15; width: 46px; height: 46px;
           border-radius: 50%; background: rgba(23,35,58,.82); border: none; box-shadow: 0 6px 18px rgba(0,0,0,.25);
           display: flex; align-items: center; justify-content: center; cursor: pointer; }
  #binoc:active { transform: scale(.94); }
  #gps { position: absolute; right: 16px; top: 106px; z-index: 15; width: 44px; height: 44px;
         border-radius: 50%; background: rgba(255,255,255,.9); border: none; box-shadow: var(--shadow);
         display: flex; align-items: center; justify-content: center; font-size: 23px; font-weight: 700;
         line-height: 1; color: var(--blue); cursor: pointer; }
  #gps:active { transform: scale(.94); }

  #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 8;
             display: none; background: #fff; padding: 12px 20px; border-radius: 14px; box-shadow: var(--shadow-lg);
             font-size: 15px; font-weight: 800; color: var(--blue-dark); }
  #loading.on { display: block; }

  /* 위치 허용 배너 */
  #locbar { position: absolute; left: 12px; right: 12px; bottom: 200px; z-index: 17;
            display: none; align-items: center; gap: 10px; background: #FFF4E5;
            border: 1.5px solid #FFD9A0; border-radius: 14px; padding: 11px 14px; box-shadow: var(--shadow); }
  #locbar.on { display: flex; }
  #locbar .lt { flex: 1; font-size: 13px; font-weight: 700; color: #8A5A12; line-height: 1.45; }
  #locbar .lb { flex-shrink: 0; padding: 8px 12px; border: none; border-radius: 10px;
                background: var(--alert); color: #fff; font-size: 13px; font-weight: 800; cursor: pointer; }

  /* ===== 하단 겹침 카드 ===== */
  #cards { position: absolute; left: 0; right: 0; bottom: 16px; z-index: 15; display: flex; gap: 12px;
           overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory;
           -webkit-overflow-scrolling: touch; padding: 0 16px; scrollbar-width: none; }
  #cards::-webkit-scrollbar { display: none; }

  .card { scroll-snap-align: center; flex: 0 0 calc(100% - 40px); background: #fff; border-radius: 18px;
          box-shadow: var(--shadow-lg); padding: 13px 15px; display: flex; align-items: center; gap: 13px; }
  .thumb { width: 50px; height: 50px; border-radius: 13px; flex-shrink: 0; display: flex;
           align-items: center; justify-content: center; font-size: 25px; }
  .thumb.indoor { background: linear-gradient(135deg, var(--blue-light), var(--blue)); }
  .thumb.outdoor { background: linear-gradient(135deg, #86EFAC, #22C55E); }
  .info { flex: 1; min-width: 0; }
  .nameRow { display: flex; align-items: baseline; gap: 8px; }
  .name { font-size: 17px; font-weight: 800; color: var(--ink); white-space: nowrap; overflow: hidden;
          text-overflow: ellipsis; flex: 1; min-width: 0; }
  .km { font-size: 14px; font-weight: 800; color: var(--blue-dark); flex-shrink: 0; }
  .sub2 { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
  .tag { font-size: 11px; font-weight: 800; padding: 2px 7px; border-radius: 7px; white-space: nowrap; }
  .tag.indoor { background: #DCE9FF; color: var(--blue-dark); }
  .tag.outdoor { background: #DCFCE7; color: #15803D; }
  .walk { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 700; color: var(--ink); white-space: nowrap; }
  .walk .lb { color: var(--sub); font-weight: 600; }
  .go { flex-shrink: 0; width: 42px; height: 42px; border-radius: 12px; border: none;
        background: var(--blue); color: #fff; font-size: 19px; font-weight: 800; cursor: pointer; }
  .go:active { background: var(--blue-dark); }

  .empty { scroll-snap-align: center; flex: 0 0 calc(100% - 40px); background: #fff; border-radius: 18px;
           box-shadow: var(--shadow-lg); padding: 20px 18px; text-align: center; }
  .empty .et { font-size: 15px; font-weight: 800; color: var(--ink); }
  .empty .es { font-size: 13px; font-weight: 600; color: var(--sub); margin-top: 6px; line-height: 1.5; }
</style>
</head>

<div id="app">

    <div class="big">🗺️</div>

  <div id="filters">
    <button class="chip on" data-kw="무더위쉼터" data-t="무더위쉼터" data-e="🏠" data-io="indoor" data-embed="1"><span class="e">🏠</span>쉼터</button>

  <button id="gps" title="내 위치">◎</button>
  <div id="loading">🔍 대피소 찾는 중…</div>
  <div id="locbar">

  <div id="cards"></div>
</div>

    const t=Math.sin(dLat/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dLng/2)**2;
    return R*2*Math.atan2(Math.sqrt(t),Math.sqrt(1-t));}
  function estWalk(km){return Math.max(1,Math.round(km*1.2/4*60));}
  function fmtMin(m){return m>=60?Math.floor(m/60)+'시간 '+(m%60)+'분':m+'분';}
  function fmtDist(km){return km<1?Math.round(km*1000)+'m':km.toFixed(1)+'km';}

  const WALK_SVG='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5E6E88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13" cy="4" r="1.6"></circle><path d="M13 7l-2 4 3 2 1 5"></path><path d="M11 11l-3 1-2 4"></path><path d="M14 13l3 1"></path></svg>';

  function pinImage(color){
    const svg='<svg xmlns="http://www.w3.org/2000/svg" width="34" height="44" viewBox="0 0 34 44">'+
      '<path d="M17 0C8 0 1 7 1 16c0 11 16 28 16 28s16-17 16-28C33 7 26 0 17 0z" fill="'+color+'" stroke="#fff" stroke-width="2"/>'+
      '<circle cx="17" cy="16" r="6" fill="#fff"/></svg>';
    return new kakao.maps.MarkerImage('data:image/svg+xml;base64,'+btoa(svg),
      new kakao.maps.Size(22,28),{offset:new kakao.maps.Point(11,28)});
  }

  function boot(){
    if(!KAKAO_KEY) return;
    const s=document.createElement('script');
    s.src='//dapi.kakao.com/v2/maps/sdk.js?autoload=false&libraries=services&appkey='+KAKAO_KEY;
    s.onload=()=>kakao.maps.load(initMap);
    document.head.appendChild(s);
  }

  function initMap(){
    $('nokey').style.display='none';
    map=new kakao.maps.Map($('map'),{center:new kakao.maps.LatLng(DEFAULT.lat,DEFAULT.lng),level:5});
    ps=new kakao.maps.services.Places();
    PIN_IN=pinImage('#2563EB');   // 실내=파랑
    PIN_OUT=pinImage('#22C55E');  // 야외=초록
    PIN_SEL=pinImage('#F97316');  // 선택=주황

    kakao.maps.event.addListener(map,'idle',()=>{
      if(Date.now()<ignoreUntil) return;
      scheduleSearch();
    });

    // 카드 스크롤 리스너 (1회만 등록, 리빌드 직후 스크롤은 무시)
    let st;
    $('cards').addEventListener('scroll',()=>{
      if(Date.now()<ignoreCardScrollUntil) return;
      clearTimeout(st);
      st=setTimeout(()=>{
        const el=$('cards').querySelector('.card'); if(!el)return;
        const idx=Math.round($('cards').scrollLeft/(el.offsetWidth+12));
        if(idx!==curIdx) focusPlace(idx,false);
      },100);
    });

    // 시작 시 1회 내 위치로
    locate(false, ()=>{
      if(myLoc){ suppressIdle(1500); map.setCenter(new kakao.maps.LatLng(myLoc.lat,myLoc.lng)); }
      scheduleSearch();
    });
  }

  function search(){
    if(!map||!ps) return;
    $('loading').classList.add('on');
    markers.forEach(m=>m.setMap(null)); markers=[]; curIdx=-1; list=[];

    const c=map.getCenter();
    const center={lat:c.getLat(),lng:c.getLng()};

    // 임베드 데이터 (무더위쉼터): 지도 중심 3km 안 필터
    if(filter.embed){
      const found = [];
      for(const s of SHELTERS){
        const km = distKm(center.lat, center.lng, s[1], s[2]);
        if(km <= 3) found.push({ name:s[0], lat:s[1], lng:s[2], addr:'', io:filter.io });
      }
      finishSearch(found);
      return;
    }

    // 그 외: 카카오 실시간 검색
    const keywords=filter.kw.split(',');
    let done=0, collected=[];
    keywords.forEach(kw=>{
      ps.keywordSearch(kw.trim(),(data,status)=>{
        if(status===kakao.maps.services.Status.OK){
          data.forEach(d=>collected.push({
            name:d.place_name, lat:+d.y, lng:+d.x,
            addr:d.road_address_name||d.address_name||'',
            io:filter.io
          }));
        }
        if(++done===keywords.length) finishSearch(collected);
      },{location:new kakao.maps.LatLng(center.lat,center.lng),radius:3000,sort:kakao.maps.services.SortBy.DISTANCE});
    });
  }

  function finishSearch(collected){
    const seen=new Set();
    list=collected.filter(p=>{const k=p.name+p.lat.toFixed(4)+p.lng.toFixed(4);
      if(seen.has(k))return false;seen.add(k);return true;});
    // 정렬 기준: 지도 중심 (모든 필터 동일하게)
    const cc=map.getCenter();
    const c={lat:cc.getLat(),lng:cc.getLng()};
    list.sort((a,b)=>distKm(c.lat,c.lng,a.lat,a.lng)-distKm(c.lat,c.lng,b.lat,b.lng));
    list=list.slice(0,30);

    $('loading').classList.remove('on');

    list.forEach((p,i)=>{
      const m=new kakao.maps.Marker({map,position:new kakao.maps.LatLng(p.lat,p.lng),title:p.name,
        image: p.io==='outdoor'?PIN_OUT:PIN_IN});
      kakao.maps.event.addListener(m,'click',()=>focusPlace(i,true));
      markers.push(m);
    });
    buildCards();
  }

  function buildCards(){
    const wrap=$('cards'); wrap.innerHTML='';
    ignoreCardScrollUntil = Date.now() + 400; // 리빌드로 인한 스크롤 리셋 무시
    if(!list.length){
      wrap.innerHTML='<div class="empty"><div class="et">'+filter.e+' 주변에 없어요</div>'+
        '<div class="es">3km 안에 '+filter.t+'가<br>검색되지 않았어요</div></div>';
      return;
    }
    const ioClass = filter.io==='outdoor'?'outdoor':'indoor';
    const ioLabel = filter.io==='outdoor'?'야외':'실내';
    list.forEach((p,i)=>{
      const c=document.createElement('div');
      c.className='card'; c.dataset.idx=i;
      c.innerHTML=
        '<div class="thumb '+ioClass+'">'+filter.e+'</div>'+
        '<div class="info">'+
          '<div class="nameRow"><div class="name">'+p.name+'</div><div class="km" data-km="'+i+'">–</div></div>'+
          '<div class="sub2">'+
            '<span class="tag '+ioClass+'">'+ioLabel+'</span>'+
            '<span class="walk" data-w="'+i+'"><span class="lb">위치 확인 중</span></span>'+
          '</div>'+
        '</div>'+
        '<button class="go" title="길찾기">→</button>';
      c.querySelector('.go').onclick=e=>{e.stopPropagation();openKakao(p);};
      wrap.appendChild(c);
    });
    wrap.scrollLeft = 0;
    updateTravel();
  }

  function updateTravel(){
    if(!myLoc) return;
    document.querySelectorAll('.walk').forEach(el=>{
      const p=list[+el.dataset.w]; if(!p) return;
      const km=distKm(myLoc.lat,myLoc.lng,p.lat,p.lng);
      el.innerHTML=WALK_SVG+'<span class="lb">도보</span> '+fmtMin(estWalk(km));
    });
    document.querySelectorAll('.km').forEach(el=>{
      const p=list[+el.dataset.km]; if(!p) return;
      el.textContent=fmtDist(distKm(myLoc.lat,myLoc.lng,p.lat,p.lng));
    });
  }

  function focusPlace(i,scrollCard){
    if(i<0||i>=list.length) return;
    if(curIdx>=0&&markers[curIdx]){
      markers[curIdx].setImage(list[curIdx].io==='outdoor'?PIN_OUT:PIN_IN);
    }
    curIdx=i; markers[i].setImage(PIN_SEL);
    const p=list[i];
    suppressIdle(1500);
    map.panTo(new kakao.maps.LatLng(p.lat,p.lng));
    if(scrollCard){
      const wrap=$('cards'), card=wrap.querySelector('.card[data-idx="'+i+'"]');
      if(card) wrap.scrollTo({left:card.offsetLeft-16,behavior:'smooth'});
    }
  }

  function fitAll(){
    const b=new kakao.maps.LatLngBounds();
    list.forEach(p=>b.extend(new kakao.maps.LatLng(p.lat,p.lng)));
    if(myLoc) b.extend(new kakao.maps.LatLng(myLoc.lat,myLoc.lng));
    suppressIdle(1500);
    map.setBounds(b);
  }

  function locate(moveMap, cb){
    if(!navigator.geolocation){ $('locbar').classList.add('on'); if(cb)cb(); return; }
    navigator.geolocation.getCurrentPosition(pos=>{
      myLoc={lat:pos.coords.latitude,lng:pos.coords.longitude};
      $('locbar').classList.remove('on');
      const loc=new kakao.maps.LatLng(myLoc.lat,myLoc.lng);
      if(myMarker) myMarker.setMap(null);
      myMarker=new kakao.maps.Marker({map,position:loc,zIndex:1,
        image:new kakao.maps.MarkerImage('data:image/svg+xml;base64,'+btoa(
          '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"><circle cx="11" cy="11" r="6" fill="#E63946" stroke="#fff" stroke-width="3"/></svg>'),
          new kakao.maps.Size(22,22),{offset:new kakao.maps.Point(11,11)})});
      if(moveMap){ suppressIdle(1000); map.panTo(loc); }
      updateTravel();
      if(!heatLoaded){ heatLoaded = true; loadHeat(myLoc.lat, myLoc.lng); }
      if(cb) cb();
    },()=>{ $('locbar').classList.add('on'); if(cb)cb(); },{enableHighAccuracy:true,timeout:8000});
  }

  document.querySelectorAll('.chip').forEach(ch=>{
    ch.onclick=()=>{
      document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
      ch.classList.add('on');
      filter={kw:ch.dataset.kw,t:ch.dataset.t,e:ch.dataset.e,io:ch.dataset.io,embed:ch.dataset.embed==='1'};
      search();
    };
  });

  $('binoc').onclick=()=>{ if(list.length) fitAll(); };
  $('gps').onclick=()=>locate(true, ()=>{});
  $('locBtn').onclick=()=>locate(true, ()=>{ scheduleSearch(); });

  function openKakao(p){
    window.open('https://map.kakao.com/link/to/'+encodeURIComponent(p.name)+','+p.lat+','+p.lng,'_blank');
  }

  // ===== 폭염 지수 (Open-Meteo, 키 없음) =====
  // 기상청 여름철 체감온도 공식 (2022.6.2~)
  function feelsLike(Ta, RH){
    // Stull 습구온도 추정식
    const Tw = Ta*Math.atan(0.151977*Math.pow(RH+8.313659,0.5))
             + Math.atan(Ta+RH) - Math.atan(RH-1.67633)
             + 0.00391838*Math.pow(RH,1.5)*Math.atan(0.023101*RH) - 4.686035;
    return -0.2442 + 0.55399*Tw + 0.45535*Ta - 0.0022*Tw*Tw + 0.00278*Tw*Ta + 3.0;
  }

  function loadHeat(lat, lng){
    const url = 'https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lng+
                '&current=temperature_2m,relative_humidity_2m&timezone=Asia%2FSeoul';
    fetch(url).then(r=>r.json()).then(d=>{
      const c = d && d.current; if(!c) return;
      const Ta = c.temperature_2m, RH = c.relative_humidity_2m;
      const feel = Math.round(feelsLike(Ta, RH));
      $('heatTemp').textContent = '체감 ' + feel + '°';
      const el = $('heatLvl');
      el.className = 'lvl';
      if(feel >= 38){ el.textContent='위험'; el.classList.add('danger'); }
      else if(feel >= 35){ el.textContent='폭염경보'; el.classList.add('alert'); }
      else if(feel >= 33){ el.textContent='폭염주의보'; el.classList.add('warn'); }
      else { el.textContent = Math.round(Ta)+'°'; }
    }).catch(()=>{ $('heatLvl').textContent='—'; });
  }

  boot();
</script>
</body>
</html>
