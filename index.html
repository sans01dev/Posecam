<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>냉 - 내 주변 냉음식 지도 v0.3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
  body { background: #E8F7FA; overflow: hidden; }

  :root {
    --primary: #0F9CB5;
    --primary-dark: #0B7A8F;
    --primary-light: #6FD6E4;
    --ink: #143038;
    --sub: #5A7982;
    --shadow: 0 6px 24px rgba(15,124,143,.18);
    --shadow-lg: 0 10px 34px rgba(15,124,143,.22);
  }

  #app {
    position: relative; width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 14px 12px calc(14px + env(safe-area-inset-bottom));
    gap: 12px;
  }

  /* ===== 제목바 ===== */
  #titlebar {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 6px; flex-shrink: 0;
  }
  #titlebar .ico { font-size: 22px; }
  #titlebar .txt { font-size: 19px; font-weight: 800; color: var(--ink); }

  /* ===== 지도 카드 (라운드 박스) ===== */
  #mapCard {
    position: relative; flex: 1; min-height: 0;
    border-radius: 20px; overflow: hidden;
    box-shadow: var(--shadow-lg);
    background: #D6EEF3;
  }
  #map { width: 100%; height: 100%; }

  #nokey {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 30px; text-align: center; color: var(--sub);
    background: #E8F7FA;
  }
  #nokey .big { font-size: 40px; }
  #nokey .t { font-size: 15px; font-weight: 700; line-height: 1.55; color: var(--ink); }
  #nokey .s { font-size: 13px; font-weight: 600; line-height: 1.55; }
  #nokey code { background:#fff; padding:2px 6px; border-radius:8px; color:var(--primary-dark); font-weight:700; }

  #gps {
    position: absolute; right: 12px; top: 12px; z-index: 15;
    width: 46px; height: 46px; border-radius: 50%;
    background: #fff; border: none; box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 700; line-height: 1; color: var(--primary);
    cursor: pointer;
  }
  #gps:active { transform: scale(.94); }

  #count {
    position: absolute; left: 12px; top: 12px; z-index: 15;
    background: #fff; border-radius: 12px; padding: 8px 12px;
    box-shadow: var(--shadow); font-size: 14px; font-weight: 700; color: var(--ink);
  }
  #count b { color: var(--primary-dark); }

  /* ===== 하단 가로 스와이프 카드 ===== */
  #cards {
    flex-shrink: 0;
    display: flex; gap: 12px;
    overflow-x: auto; overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    padding: 4px 2px 2px;
    scrollbar-width: none;
  }
  #cards::-webkit-scrollbar { display: none; }

  .card {
    scroll-snap-align: center;
    flex: 0 0 calc(100% - 40px);
    background: #fff; border-radius: 20px;
    box-shadow: var(--shadow-lg);
    padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .card .top { display: flex; gap: 14px; align-items: center; }
  .thumb {
    width: 58px; height: 58px; border-radius: 16px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--primary-light), var(--primary));
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
  }
  .info { flex: 1; min-width: 0; }
  .name { font-size: 18px; font-weight: 800; color: var(--ink);
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meta { font-size: 14px; font-weight: 600; color: var(--sub); margin-top: 3px; }
  .dish { display: inline-block; margin-top: 8px; padding: 4px 10px; border-radius: 10px;
          background: #E0F5F8; color: var(--primary-dark); font-size: 13px; font-weight: 700; }
  .btn {
    padding: 14px; border: none; border-radius: 14px;
    background: var(--primary); color: #fff;
    font-size: 16px; font-weight: 800; cursor: pointer;
  }
  .btn:active { background: var(--primary-dark); }
</style>
</head>
<body>
<div id="app">
  <div id="titlebar">
    <span class="ico">🧊</span>
    <span class="txt">내 주변 냉음식</span>
  </div>

  <div id="mapCard">
    <div id="map"></div>
    <div id="count">🧊 냉음식 <b id="cnum">0</b>곳</div>
    <button id="gps" title="내 위치">◎</button>
    <div id="nokey">
      <div class="big">🗺️</div>
      <div class="t">카카오맵 키를 넣어주세요</div>
      <div class="s">
        GitHub Pages 도메인을<br>
        카카오 콘솔에 등록 →<br>
        JavaScript 키를 <code>KAKAO_KEY</code>에 입력
      </div>
    </div>
  </div>

  <div id="cards"></div>
</div>

<script>
/* =========================================================
   냉음식 지도 v0.3
   - 라운드 지도박스 + 하단 가로 스와이프 카드
   - 카드 넘기면 지도가 해당 식당으로 이동
   ========================================================= */
  const KAKAO_KEY = 'b2e63e83f6f056f7c4d525b8b503b686';

  const PLACES = [
    { name:'고메밀면 아주점', lat:34.8675089, lng:128.6891044, dish:'밀면', icon:'🍜', addr:'아주1로4길 21' },
    { name:'거제명가',       lat:34.867917,  lng:128.6793342, dish:'냉면', icon:'🍜', addr:'아주1로 64' },
    { name:'아라가야 냉면 학동점', lat:34.83338, lng:128.7013059, dish:'냉면·갈비탕', icon:'🥶', addr:'지세포해안로 40' },
    { name:'거제냉밀면',     lat:34.8881026, lng:128.6227077, dish:'물밀면', icon:'❄️', addr:'고현동' },
    { name:'거제촌국수',     lat:34.9094075, lng:128.5459043, dish:'콩국수·냉국수', icon:'🥣', addr:'사등리' },
  ];

  const $ = id => document.getElementById(id);
  let map, myMarker, markers = [], curIdx = -1;

  function boot() {
    if (!KAKAO_KEY) return;
    const s = document.createElement('script');
    s.src = '//dapi.kakao.com/v2/maps/sdk.js?autoload=false&appkey=' + KAKAO_KEY;
    s.onload = () => kakao.maps.load(initMap);
    document.head.appendChild(s);
  }

  function initMap() {
    $('nokey').style.display = 'none';

    map = new kakao.maps.Map($('map'), {
      center: new kakao.maps.LatLng(34.876, 128.692),
      level: 6
    });

    PLACES.forEach((p, i) => {
      const marker = new kakao.maps.Marker({
        map,
        position: new kakao.maps.LatLng(p.lat, p.lng),
        title: p.name
      });
      kakao.maps.event.addListener(marker, 'click', () => focusPlace(i, true));
      markers.push(marker);
    });

    $('cnum').textContent = PLACES.length;
    buildCards();
    locate(true);
  }

  function buildCards() {
    const wrap = $('cards');
    PLACES.forEach((p, i) => {
      const c = document.createElement('div');
      c.className = 'card';
      c.dataset.idx = i;
      c.innerHTML =
        '<div class="top">' +
          '<div class="thumb">' + p.icon + '</div>' +
          '<div class="info">' +
            '<div class="name">' + p.name + '</div>' +
            '<div class="meta">거제시 · ' + p.addr + '</div>' +
            '<div class="dish">🧊 ' + p.dish + '</div>' +
          '</div>' +
        '</div>' +
        '<button class="btn">카카오맵으로 길찾기 →</button>';
      c.querySelector('.btn').onclick = () => openKakao(p);
      wrap.appendChild(c);
    });

    let t;
    wrap.addEventListener('scroll', () => {
      clearTimeout(t);
      t = setTimeout(() => {
        const cw = wrap.querySelector('.card').offsetWidth + 12;
        const idx = Math.round(wrap.scrollLeft / cw);
        if (idx !== curIdx) focusPlace(idx, false);
      }, 90);
    });
  }

  function focusPlace(i, scrollCard) {
    if (i < 0 || i >= PLACES.length) return;
    curIdx = i;
    const p = PLACES[i];
    map.panTo(new kakao.maps.LatLng(p.lat, p.lng));
    if (scrollCard) {
      const wrap = $('cards');
      const card = wrap.querySelector('.card[data-idx="' + i + '"]');
      if (card) wrap.scrollTo({ left: card.offsetLeft - 20, behavior: 'smooth' });
    }
  }

  function locate(silent) {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(pos => {
      const loc = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
      if (myMarker) myMarker.setMap(null);
      myMarker = new kakao.maps.Marker({
        map, position: loc,
        image: new kakao.maps.MarkerImage(
          'data:image/svg+xml;base64,' + btoa(
            '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"><circle cx="12" cy="12" r="7" fill="#E63946" stroke="#fff" stroke-width="3"/></svg>'
          ),
          new kakao.maps.Size(24, 24)
        )
      });
      if (!silent) map.panTo(loc);
    }, () => {}, { enableHighAccuracy: true, timeout: 8000 });
  }

  $('gps').onclick = () => locate(false);

  function openKakao(p) {
    const url = 'https://map.kakao.com/link/to/' +
                encodeURIComponent(p.name) + ',' + p.lat + ',' + p.lng;
    window.open(url, '_blank');
  }

  boot();
</script>
</body>
</html>
