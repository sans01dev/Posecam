<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>talkall 알림</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --coral:#FF6B4A; --bg:#14161C; --card:#1E212B; --line:#2A2E3A; --ink:#F2F4F8; --dim:#8A90A0; --green:#34C759; --red:#FF453A; }
  body{ font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; letter-spacing:-.3px; overscroll-behavior:none; }
  .wrap{ max-width:440px; margin:0 auto; padding:20px 18px 40px; min-height:100vh; display:flex; flex-direction:column; }
  .top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .brand{ display:flex; align-items:center; gap:9px; font-size:17px; font-weight:800; }
  .brand .dot{ width:9px; height:9px; border-radius:50%; background:var(--red); box-shadow:0 0 8px var(--red); transition:.3s; }
  .brand .dot.live{ background:var(--green); box-shadow:0 0 8px var(--green); animation:blink 1.4s infinite; }
  @keyframes blink{ 50%{ opacity:.35 } }
  .gear{ background:none; border:none; color:var(--dim); font-size:22px; cursor:pointer; padding:4px; }

  .hero{ background:var(--card); border:1px solid var(--line); border-radius:22px; padding:30px 22px; text-align:center; margin-bottom:14px; position:relative; overflow:hidden; }
  .hero.flash{ animation:flash .9s; }
  @keyframes flash{ 0%{ background:var(--coral); } 100%{ background:var(--card); } }
  .hero .lb{ font-size:13px; font-weight:700; color:var(--dim); margin-bottom:8px; letter-spacing:.5px; }
  .hero .num{ font-size:66px; font-weight:900; line-height:1; letter-spacing:-2px; color:var(--coral); font-variant-numeric:tabular-nums; }
  .hero .num.pop{ animation:pop .5s; }
  @keyframes pop{ 0%{ transform:scale(1); } 40%{ transform:scale(1.14); } 100%{ transform:scale(1); } }
  .hero .sub{ font-size:13px; color:var(--dim); font-weight:600; margin-top:12px; }
  .hero .gain{ display:inline-block; margin-top:12px; background:rgba(255,107,74,.14); color:var(--coral); font-size:14px; font-weight:800; padding:5px 14px; border-radius:999px; min-height:0; }

  .row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .stat{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px 15px; }
  .stat .k{ font-size:12px; color:var(--dim); font-weight:700; margin-bottom:5px; }
  .stat .v{ font-size:20px; font-weight:800; font-variant-numeric:tabular-nums; }
  .stat .v.sm{ font-size:14px; font-weight:700; }

  .ctrls{ display:flex; gap:10px; margin-bottom:14px; }
  .btn{ flex:1; padding:15px; border:none; border-radius:14px; font-size:15px; font-weight:800; font-family:inherit; cursor:pointer; }
  .btn.go{ background:var(--coral); color:#fff; }
  .btn.go.stop{ background:#3A3E4A; color:var(--ink); }
  .btn.ghost{ background:var(--card); border:1px solid var(--line); color:var(--ink); flex:0 0 auto; padding:15px 16px; }
  .btn.ghost.off{ color:var(--dim); }

  .seg{ display:flex; background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden; margin-bottom:14px; }
  .seg button{ flex:1; padding:12px 0; background:none; border:none; color:var(--dim); font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; }
  .seg button.on{ background:var(--coral); color:#fff; }

  .log-h{ font-size:13px; font-weight:700; color:var(--dim); margin:6px 4px 8px; }
  .log{ background:var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden; flex:1; min-height:120px; }
  .li{ display:flex; align-items:center; justify-content:space-between; padding:12px 15px; font-size:14px; }
  .li + .li{ border-top:1px solid var(--line); }
  .li .lt{ color:var(--dim); font-weight:600; font-size:13px; }
  .li .ld{ font-weight:800; color:var(--coral); }
  .li .lc{ color:var(--dim); font-size:13px; font-weight:600; }
  .empty{ padding:26px 15px; text-align:center; color:var(--dim); font-size:13px; }

  .err{ background:rgba(255,69,58,.12); border:1px solid rgba(255,69,58,.4); color:#FF9A92; border-radius:12px; padding:12px 14px; font-size:12.5px; font-weight:600; line-height:1.5; margin-bottom:14px; display:none; }
  .err.show{ display:block; }
  .err code{ background:rgba(0,0,0,.3); padding:1px 6px; border-radius:5px; font-size:11.5px; }

  .sheet{ position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:50; display:none; align-items:flex-end; justify-content:center; }
  .sheet.show{ display:flex; }
  .sheet-in{ background:var(--card); width:100%; max-width:440px; border-radius:22px 22px 0 0; padding:22px 18px calc(22px + env(safe-area-inset-bottom)); }
  .sheet-in h3{ font-size:17px; font-weight:800; margin-bottom:14px; }
  .fld{ margin-bottom:14px; }
  .fld label{ display:block; font-size:12px; color:var(--dim); font-weight:700; margin-bottom:6px; }
  .fld input{ width:100%; background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:12px; color:var(--ink); font-size:13px; font-family:inherit; }
  .sheet-in .btn.go{ width:100%; margin-top:4px; }
  .foot{ text-align:center; font-size:11px; color:#4A5060; margin-top:16px; font-weight:600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><span class="dot" id="dot"></span> talkall 알림</div>
    <button class="gear" onclick="openCfg()">⚙️</button>
  </div>

  <div class="err" id="err"></div>

  <div class="hero" id="hero">
    <div class="lb">💬 talkall 누적 사용</div>
    <div class="num" id="num">—</div>
    <div class="gain" id="gain" style="visibility:hidden">+0</div>
    <div class="sub" id="sub">감시 대기 중</div>
  </div>

  <div class="row">
    <div class="stat"><div class="k">이번 세션 증가</div><div class="v" id="sess">+0</div></div>
    <div class="stat"><div class="k">마지막 증가</div><div class="v sm" id="lasthit">아직 없음</div></div>
  </div>

  <div class="seg" id="seg">
    <button data-s="5">5초</button>
    <button data-s="10" class="on">10초</button>
    <button data-s="30">30초</button>
    <button data-s="60">1분</button>
  </div>

  <div class="ctrls">
    <button class="btn go" id="goBtn" onclick="toggleWatch()">감시 시작</button>
    <button class="btn ghost" id="sndBtn" onclick="toggleSound()" title="소리">🔔</button>
    <button class="btn ghost" id="notiBtn" onclick="askNoti()" title="알림">📩</button>
  </div>

  <div class="log-h">최근 증가 · <span id="checkAt" style="color:#4A5060">확인 전</span></div>
  <div class="log" id="log"><div class="empty">감시를 시작하면<br>카운트가 늘 때마다 여기 뜨고 알림이 와요</div></div>

  <div class="foot">조회 전용(<code style="color:#4A5060">/</code>)만 확인 · 실제 카운트엔 영향 없음</div>
</div>

<!-- 설정 시트 -->
<div class="sheet" id="cfg" onclick="if(event.target===this)closeCfg()">
  <div class="sheet-in">
    <h3>설정</h3>
    <div class="fld"><label>카운터 주소 (조회 · GET /)</label><input id="cfgUrl" spellcheck="false"></div>
    <div class="fld"><label>JSON에서 읽을 필드명</label><input id="cfgField" spellcheck="false" placeholder="count"></div>
    <button class="btn go" onclick="saveCfg()">저장</button>
  </div>
</div>

<script>
  // ===== 설정 =====
  const DEFAULT = { url:'https://talkreport-counter.san0231ai.workers.dev/', field:'count' };
  let CFG = load('talkall_alarm_cfg', DEFAULT);
  let interval = 10, timer=null, watching=false;
  let last=null, baseline=null, sessionGain=0, soundOn=true;
  let ctx=null;

  function load(k,def){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):def; }catch(e){ return def; } }
  function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

  // ===== 카운트 조회 =====
  async function poll(){
    const url = CFG.url + (CFG.url.indexOf('?')<0?'?':'&') + '_t=' + Date.now(); // 캐시 방지
    try{
      const r = await fetch(url, {method:'GET', cache:'no-store'});
      if(!r.ok) throw new Error('HTTP '+r.status);
      let count;
      const txt = await r.text();
      try{ const j=JSON.parse(txt); count = (CFG.field && j[CFG.field]!=null)?j[CFG.field]:firstNum(txt); }
      catch(e){ count = firstNum(txt); }
      if(typeof count!=='number' || isNaN(count)) throw new Error('숫자 파싱 실패');
      hideErr();
      onCount(count);
      setCheck();
    }catch(e){
      showErr(e.message);
      setDot(false);
    }
  }
  function firstNum(s){ const m=String(s).replace(/,/g,'').match(/-?\d+(\.\d+)?/); return m?parseFloat(m[0]):NaN; }

  function onCount(count){
    document.getElementById('num').textContent = count.toLocaleString();
    if(baseline===null){ baseline=count; last=count; save('talkall_alarm_last', count); return; }
    if(count>last){
      const delta = count-last;
      sessionGain += delta;
      fireAlarm(delta, count);
      addLog(delta, count);
      document.getElementById('sess').textContent = '+'+sessionGain;
      document.getElementById('lasthit').textContent = nowStr();
      const g=document.getElementById('gain'); g.style.visibility='visible'; g.textContent='방금 +'+delta;
    }
    last = count;
    save('talkall_alarm_last', count);
  }

  // ===== 알림 발동 =====
  function fireAlarm(delta, count){
    const hero=document.getElementById('hero'), num=document.getElementById('num');
    hero.classList.remove('flash'); void hero.offsetWidth; hero.classList.add('flash');
    num.classList.remove('pop'); void num.offsetWidth; num.classList.add('pop');
    if(soundOn) beep();
    if(navigator.vibrate) navigator.vibrate([180,90,180]);
    if('Notification' in window && Notification.permission==='granted'){
      try{ new Notification('talkall 🔔 +'+delta, { body:'누적 '+count.toLocaleString()+'명', tag:'talkall', renotify:true }); }catch(e){}
    }
  }
  function beep(){
    try{
      if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)();
      if(ctx.state==='suspended') ctx.resume();
      const t=ctx.currentTime;
      [880,1320].forEach((f,i)=>{
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type='sine'; o.frequency.value=f;
        o.connect(g); g.connect(ctx.destination);
        const st=t+i*0.14;
        g.gain.setValueAtTime(0.0001, st);
        g.gain.exponentialRampToValueAtTime(0.35, st+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, st+0.13);
        o.start(st); o.stop(st+0.14);
      });
    }catch(e){}
  }

  // ===== 로그 =====
  function addLog(delta, count){
    const log=document.getElementById('log');
    if(log.querySelector('.empty')) log.innerHTML='';
    const li=document.createElement('div'); li.className='li';
    li.innerHTML='<span class="lt">'+nowStr()+'</span><span class="ld">+'+delta+'</span><span class="lc">누적 '+count.toLocaleString()+'</span>';
    log.insertBefore(li, log.firstChild);
    while(log.children.length>40) log.removeChild(log.lastChild);
  }

  // ===== 감시 on/off =====
  function toggleWatch(){
    watching=!watching;
    const b=document.getElementById('goBtn');
    if(watching){
      if(!ctx){ try{ ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } // 사용자 제스처로 오디오 언락
      b.textContent='감시 정지'; b.classList.add('stop');
      document.getElementById('sub').textContent=interval+'초마다 확인 중…';
      setDot(true);
      poll(); timer=setInterval(poll, interval*1000);
    }else{
      b.textContent='감시 시작'; b.classList.remove('stop');
      document.getElementById('sub').textContent='감시 정지됨';
      setDot(false);
      clearInterval(timer); timer=null;
    }
  }
  function setInt(s){
    interval=s;
    [...document.querySelectorAll('#seg button')].forEach(x=>x.classList.toggle('on', +x.dataset.s===s));
    if(watching){ clearInterval(timer); timer=setInterval(poll, interval*1000); document.getElementById('sub').textContent=interval+'초마다 확인 중…'; }
  }

  // ===== 소리/알림 권한 =====
  function toggleSound(){ soundOn=!soundOn; const b=document.getElementById('sndBtn'); b.textContent=soundOn?'🔔':'🔕'; b.classList.toggle('off',!soundOn); if(soundOn) beep(); }
  function askNoti(){
    if(!('Notification' in window)){ alert('이 브라우저는 알림을 지원하지 않아요'); return; }
    Notification.requestPermission().then(p=>{
      const b=document.getElementById('notiBtn');
      if(p==='granted'){ b.textContent='✅'; try{ new Notification('talkall 알림 켜짐 🔔',{body:'이제 카운트가 늘면 알려드려요'}); }catch(e){} }
      else b.textContent='🚫';
    });
  }

  // ===== 상태 표시 =====
  function setDot(live){ document.getElementById('dot').classList.toggle('live', live); }
  function setCheck(){ document.getElementById('checkAt').textContent='마지막 확인 '+nowStr(); }
  function nowStr(){ const d=new Date(), p=n=>String(n).padStart(2,'0'); return p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds()); }
  function showErr(m){ const e=document.getElementById('err'); e.className='err show'; e.innerHTML='⚠️ 조회 실패: '+m+'<br>CORS 때문이면 Worker에 <code>Access-Control-Allow-Origin: *</code> 헤더를 추가하세요.'; document.getElementById('sub').textContent='연결 오류 · 재시도 중'; }
  function hideErr(){ document.getElementById('err').className='err'; }

  // ===== 설정 시트 =====
  function openCfg(){ document.getElementById('cfgUrl').value=CFG.url; document.getElementById('cfgField').value=CFG.field; document.getElementById('cfg').classList.add('show'); }
  function closeCfg(){ document.getElementById('cfg').classList.remove('show'); }
  function saveCfg(){ CFG.url=document.getElementById('cfgUrl').value.trim()||DEFAULT.url; CFG.field=document.getElementById('cfgField').value.trim()||'count'; save('talkall_alarm_cfg', CFG); closeCfg(); baseline=null; if(watching) poll(); }

  // ===== init =====
  document.querySelectorAll('#seg button').forEach(b=>b.onclick=()=>setInt(+b.dataset.s));
  (function initNoti(){ if('Notification' in window && Notification.permission==='granted') document.getElementById('notiBtn').textContent='✅'; })();
  // 이전에 본 값 복원 (재실행 시 헛알림 방지용 표시)
  (function initLast(){ const v=load('talkall_alarm_last',null); if(v!=null){ document.getElementById('num').textContent=Number(v).toLocaleString(); document.getElementById('sub').textContent='마지막 기록 '+Number(v).toLocaleString()+'명 · 감시 시작을 누르세요'; } })();
</script>
</body>
</html>
