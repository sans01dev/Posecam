<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>냉 - 거제 냉면 맛집 v0.5</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
  body { background: #EEF4F6; overflow: hidden; }

  :root {
    --primary: #0F9CB5;
    --primary-dark: #0B7A8F;
    --primary-light: #6FD6E4;
    --ink: #1B2B30;
    --sub: #6A828A;
    --line: #E4EBEE;
    --shadow: 0 4px 16px rgba(20,40,50,.12);
    --shadow-lg: 0 12px 36px rgba(20,40,50,.16);
  }

  #app {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 14px 12px calc(14px + env(safe-area-inset-bottom));
  }

  /* ===== 전체 카드 (헤더+지도+식당카드) ===== */
  #card {
    position: relative; flex: 1; min-height: 0;
    display: flex; flex-direction: column;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 22px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }

  /* 헤더바 */
  #header {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 18px; flex-shrink: 0;
    border-bottom: 1px solid var(--line);
    background: #fff; z-index: 6;
  }
  #header .mapico { display: flex; align-items: center; }
  #header .htxt { font-size: 19px; font-weight: 800; color: var(--ink); }

  /* 지도 영역 */
  #mapWrap { position: relative; flex: 1; min-height: 0; background: #D6EEF3; }
  #map { width: 100%; height: 100%; }

  #nokey {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 30px; text-align: center; color: var(--sub); background: #E8F7FA;
  }
  #nokey .big { font-size: 40px; }
  #nokey .t { font-size: 15px; font-weight: 700; line-height: 1.55; color: var(--ink); }
  #nokey .s { font-size: 13px; font-weight: 600; line-height: 1.55; }
  #nokey code { background:#fff; padding:2px 6px; border-radius:8px; color:var(--primary-dark); font-weight:700; }

  /* 망원경 버튼 (전체 핀 보기) */
  #binoc {
    position: absolute; right: 16px; top: 16px; z-index: 15;
    width: 52px; height: 52px; border-radius: 50%;
    background: #1B2B30; border: none;
    box-shadow: 0 6px 18px rgba(0,0,0,.28);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  #binoc:active { transform: scale(.94); }

  /* GPS 버튼 */
  #gps {
    position: absolute; right: 16px; top: 78px; z-index: 15;
    width: 46px; height: 46px; border-radius: 50%;
    background: #fff; border: none; box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 700; line-height: 1; color: var(--primary);
    cursor: pointer;
  }
  #gps:active { transform: scale(.94); }

  /* ===== 하단 겹치는 식당 카드 ===== */
  #cards {
    position: absolute; left: 0; right: 0; bottom: 14px; z-index: 15;
    display: flex; gap: 12px;
    overflow-x: auto; overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    padding: 0 16px;
    scrollbar-width: none;
  }
  #cards::-webkit-scrollbar { display: none; }

  .rest {
    scroll-snap-align: center;
    flex: 0 0 calc(100% - 52px);
    background: #fff; border-radius: 18px;
    box-shadow: 0 8px 26px rgba(20,40,50,.20);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
  }
  .thumb {
    width: 62px; height: 62px; border-radius: 14px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--primary-light), var(--primary));
    display: flex; align-items: center; justify-content: center; font-size: 30px;
  }
  .info { flex: 1; min-width: 0; }
  .name { font-size: 19px; font-weight: 800; color: var(--ink);
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meta { font-size: 14px; font-weight: 600; color: var(--sub); margin-top: 4px; }
  .travel { display: flex; gap: 12px; margin-top: 6px; font-size: 13px; font-weight: 700; color: var(--ink); }
  .travel span { display: inline-flex; align-items: center; gap: 4px; }
  .travel .ic { display: inline-flex; }
  .travel .dist { color: var(--primary-dark); }
  .travel .wait { color: var(--sub); font-weight: 600; }
  .dish { display: inline-block; margin-top: 8px; padding: 3px 9px; border-radius: 9px;
          background: #E0F5F8; color: var(--primary-dark); font-size: 12.5px; font-weight: 700; }
  .go {
    flex-shrink: 0; width: 44px; height: 44px; border-radius: 12px; border: none;
    background: var(--primary); color: #fff; font-size: 20px; font-weight: 800; cursor: pointer;
  }
  .go:active { background: var(--primary-dark); }
</style>
</head>
<body>
<div id="app">
  <div id="card">
    <div id="header">
      <span class="mapico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1B2B30" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 8 3 16 6 23 3 23 18 16 21 8 18 1 21 1 6"></polygon><line x1="8" y1="3" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="21"></line></svg></span>
      <span class="htxt">거제 냉면 맛집</span>
    </div>

    <div id="mapWrap">
      <div id="map"></div>
      <button id="binoc" title="전체 보기"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M7 5.5h3l1 2v7a2.5 2.5 0 0 1-5 0v-6.5a2 2 0 0 1 0-2.5z"></path><path d="M17 5.5h-3l-1 2v7a2.5 2.5 0 0 0 5 0v-6.5a2 2 0 0 0 0-2.5z"></path><line x1="11" y1="11" x2="13" y2="11"></line></svg></button>
      <button id="gps" title="내 위치">◎</button>
      <div id="nokey">
        <div class="big">🗺️</div>
        <div class="t">카카오맵 키를 넣어주세요</div>
        <div class="s">
          GitHub Pages 도메인을<br>
          카카오 콘솔에 등록 →<br>
          JavaScript 키를 <code>KAKAO_KEY</code>에 입력
        </div>
      </div>
      <div id="cards"></div>
    </div>
  </div>
</div>

<script>
/* =========================================================
   냉음식 지도 v0.4
   - 흰 헤더바 + 빨간 물방울 핀(선택=파랑) + 망원경(전체보기)
   - 지도 하단 겹치는 식당 카드(가로 스와이프, 지도 동기화)
   ========================================================= */
  const KAKAO_KEY = 'b2e63e83f6f056f7c4d525b8b503b686';

  const PLACES = [
    { name:'고메밀면 아주점', lat:34.8675089, lng:128.6891044, dish:'밀면', icon:'🍜', addr:'아주1로4길 21' },
    { name:'거제명가',       lat:34.867917,  lng:128.6793342, dish:'냉면', icon:'🍜', addr:'아주1로 64' },
    { name:'아라가야 냉면 학동점', lat:34.83338, lng:128.7013059, dish:'냉면·갈비탕', icon:'🥶', addr:'지세포해안로 40' },
    { name:'거제냉밀면',     lat:34.8881026, lng:128.6227077, dish:'물밀면', icon:'❄️', addr:'고현동' },
    { name:'거제촌국수',     lat:34.9094075, lng:128.5459043, dish:'콩국수·냉국수', icon:'🥣', addr:'사등리' },
  ];

  const $ = id => document.getElementById(id);
  let map, myMarker, markers = [], curIdx = -1, myLoc = null;

  // 직선거리(km) - Haversine
  function distKm(lat1, lng1, lat2, lng2) {
    const R = 6371, toR = d => d * Math.PI / 180;
    const dLat = toR(lat2 - lat1), dLng = toR(lng2 - lng1);
    const a = Math.sin(dLat/2)**2 +
              Math.cos(toR(lat1)) * Math.cos(toR(lat2)) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // 시간 추정 (분)
  function estCar(km)  { return Math.max(1, Math.round(km * 1.3 / 40 * 60)); }  // 40km/h
  function estWalk(km) { return Math.max(1, Math.round(km * 1.2 / 4 * 60)); }   // 4km/h
  function fmtMin(m) { return m >= 60 ? Math.floor(m/60) + '시간 ' + (m%60) + '분' : m + '분'; }
  function fmtDist(km) { return km < 1 ? Math.round(km*1000) + 'm' : km.toFixed(1) + 'km'; }

  // 아이콘 SVG
  const CAR_SVG  = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#0B7A8F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l1.5-4.5A2 2 0 0 1 8.4 7h7.2a2 2 0 0 1 1.9 1.5L19 13"></path><path d="M5 13h14v4a1 1 0 0 1-1 1h-1a1 1 0 0 1-1-1v-1H8v1a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-4z"></path><circle cx="7.5" cy="15.5" r="1"></circle><circle cx="16.5" cy="15.5" r="1"></circle></svg>';
  const WALK_SVG = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6A828A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13" cy="4" r="1.6"></circle><path d="M13 7l-2 4 3 2 1 5"></path><path d="M11 11l-3 1-2 4"></path><path d="M14 13l3 1"></path></svg>';

  // 모든 카드 거리/시간 갱신
  function updateTravel() {
    if (!myLoc) return;
    document.querySelectorAll('.travel').forEach(el => {
      const p = PLACES[+el.dataset.tidx];
      const km = distKm(myLoc.lat, myLoc.lng, p.lat, p.lng);
      el.innerHTML =
        '<span class="dist">' + fmtDist(km) + '</span>' +
        '<span><span class="ic">' + CAR_SVG + '</span>' + fmtMin(estCar(km)) + '</span>' +
        '<span class="wait"><span class="ic">' + WALK_SVG + '</span>' + fmtMin(estWalk(km)) + '</span>';
    });
  }

  // 물방울 핀 SVG (color)
  function pinImage(color) {
    const svg =
      '<svg xmlns="http://www.w3.org/2000/svg" width="34" height="44" viewBox="0 0 34 44">' +
      '<path d="M17 0C8 0 1 7 1 16c0 11 16 28 16 28s16-17 16-28C33 7 26 0 17 0z" fill="' + color + '" stroke="#fff" stroke-width="2"/>' +
      '<circle cx="17" cy="16" r="6" fill="#fff"/></svg>';
    return new kakao.maps.MarkerImage(
      'data:image/svg+xml;base64,' + btoa(svg),
      new kakao.maps.Size(34, 44),
      { offset: new kakao.maps.Point(17, 44) }
    );
  }
  let RED, BLUE;

  function boot() {
    if (!KAKAO_KEY) return;
    const s = document.createElement('script');
    s.src = '//dapi.kakao.com/v2/maps/sdk.js?autoload=false&appkey=' + KAKAO_KEY;
    s.onload = () => kakao.maps.load(initMap);
    document.head.appendChild(s);
  }

  function initMap() {
    $('nokey').style.display = 'none';

    map = new kakao.maps.Map($('map'), {
      center: new kakao.maps.LatLng(34.876, 128.692),
      level: 8
    });

    RED = pinImage('#E63946');
    BLUE = pinImage('#2563EB');

    PLACES.forEach((p, i) => {
      const marker = new kakao.maps.Marker({
        map,
        position: new kakao.maps.LatLng(p.lat, p.lng),
        title: p.name,
        image: RED
      });
      kakao.maps.event.addListener(marker, 'click', () => focusPlace(i, true));
      markers.push(marker);
    });

    buildCards();
    fitAll();
    locate(true);
  }

  function buildCards() {
    const wrap = $('cards');
    PLACES.forEach((p, i) => {
      const c = document.createElement('div');
      c.className = 'rest';
      c.dataset.idx = i;
      c.innerHTML =
        '<div class="thumb">' + p.icon + '</div>' +
        '<div class="info">' +
          '<div class="name">' + p.name + '</div>' +
          '<div class="travel" data-tidx="' + i + '">' +
            '<span class="wait">📍 위치 확인 중…</span>' +
          '</div>' +
          '<div class="dish">🧊 ' + p.dish + '</div>' +
        '</div>' +
        '<button class="go" title="길찾기">→</button>';
      c.querySelector('.go').onclick = (e) => { e.stopPropagation(); openKakao(p); };
      wrap.appendChild(c);
    });

    let t;
    wrap.addEventListener('scroll', () => {
      clearTimeout(t);
      t = setTimeout(() => {
        const cw = wrap.querySelector('.rest').offsetWidth + 12;
        const idx = Math.round(wrap.scrollLeft / cw);
        if (idx !== curIdx) focusPlace(idx, false);
      }, 90);
    });
  }

  // 선택 식당: 핀 파랑 + 지도 이동 + 카드 동기화
  function focusPlace(i, scrollCard) {
    if (i < 0 || i >= PLACES.length) return;
    // 이전 선택 핀 빨강 복원
    if (curIdx >= 0 && markers[curIdx]) markers[curIdx].setImage(RED);
    curIdx = i;
    markers[i].setImage(BLUE);
    const p = PLACES[i];
    map.panTo(new kakao.maps.LatLng(p.lat, p.lng));
    if (scrollCard) {
      const wrap = $('cards');
      const card = wrap.querySelector('.rest[data-idx="' + i + '"]');
      if (card) wrap.scrollTo({ left: card.offsetLeft - 16, behavior: 'smooth' });
    }
  }

  // 망원경: 전체 핀 다 보이게
  function fitAll() {
    const bounds = new kakao.maps.LatLngBounds();
    PLACES.forEach(p => bounds.extend(new kakao.maps.LatLng(p.lat, p.lng)));
    map.setBounds(bounds);
  }

  function locate(silent) {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(pos => {
      myLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      const loc = new kakao.maps.LatLng(myLoc.lat, myLoc.lng);
      if (myMarker) myMarker.setMap(null);
      myMarker = new kakao.maps.Marker({
        map, position: loc,
        image: new kakao.maps.MarkerImage(
          'data:image/svg+xml;base64,' + btoa(
            '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"><circle cx="11" cy="11" r="6" fill="#2563EB" stroke="#fff" stroke-width="3"/></svg>'
          ),
          new kakao.maps.Size(22, 22),
          { offset: new kakao.maps.Point(11, 11) }
        ),
        zIndex: 1
      });
      if (!silent) map.panTo(loc);
      updateTravel();
    }, () => {}, { enableHighAccuracy: true, timeout: 8000 });
  }

  $('binoc').onclick = fitAll;
  $('gps').onclick = () => locate(false);

  function openKakao(p) {
    const url = 'https://map.kakao.com/link/to/' +
                encodeURIComponent(p.name) + ',' + p.lat + ',' + p.lng;
    window.open(url, '_blank');
  }

  boot();
</script>
</body>
</html>
