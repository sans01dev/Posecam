<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>포즈따라 v0.4</title>
<style>
  :root{
    --accent:#FF2E63; --dash:#ffffff; --shutter:#FF2E63; --shutter-ring:#ffffff;
    --chipon-bg:#ffffff; --chipon-fg:#111; --chipoff-bg:rgba(20,20,26,.55); --chipoff-fg:#fff;
    --brand-font:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
    --label-font:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
    --fillcol:rgba(255,46,99,.16); --tint:transparent; --chip-radius:999px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#0E0E12;overflow:hidden;overscroll-behavior:none}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:#fff;position:fixed;inset:0}

  /* ===== THEMES ===== */
  body.t-film{ --accent:#E8B65A; --dash:#f6e8c8; --shutter:#E0492E; --shutter-ring:#f6e8c8;
    --chipon-bg:#E8B65A; --chipon-fg:#1a1610; --chipoff-bg:transparent; --chipoff-fg:#cdb88c;
    --brand-font:"Courier New",monospace; --label-font:"Courier New",monospace;
    --fillcol:rgba(232,182,90,.11); --tint:rgba(120,84,30,.20); --chip-radius:7px; }
  body.t-mz{ --accent:#EC4899; --dash:#ffffff; --shutter:#EC4899; --shutter-ring:#A855F7;
    --chipon-bg:#EC4899; --chipon-fg:#fff; --chipoff-bg:rgba(255,255,255,.12); --chipoff-fg:#fff;
    --fillcol:rgba(236,72,153,.14); --tint:rgba(40,20,55,.22); --chip-radius:999px; }
  body.t-luxe{ --accent:#C9A24B; --dash:rgba(255,255,255,.86); --shutter:#0a0a0c; --shutter-ring:#C9A24B;
    --chipon-bg:transparent; --chipon-fg:#C9A24B; --chipoff-bg:transparent; --chipoff-fg:#777;
    --brand-font:Georgia,"Times New Roman",serif; --label-font:Georgia,serif;
    --fillcol:rgba(201,162,75,.10); --tint:rgba(0,0,0,.28); --chip-radius:2px; }

  #stage{position:absolute;inset:0;background:#000;overflow:hidden}
  #cam{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
  #cam.mirror{transform:scaleX(-1)}
  #tint{position:absolute;inset:0;background:var(--tint);pointer-events:none;mix-blend-mode:multiply}
  #overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  #flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none}

  /* film sprockets */
  #sprocketL,#sprocketR{position:absolute;top:0;bottom:0;width:16px;display:none;flex-direction:column;
    justify-content:space-around;padding:10px 0;z-index:4;pointer-events:none}
  #sprocketL{left:0}#sprocketR{right:0}
  body.t-film #sprocketL,body.t-film #sprocketR{display:flex}
  .spk{width:9px;height:18px;border-radius:2px;background:rgba(8,6,4,.78);margin:0 auto}

  /* luxe corner frame */
  #lframe{position:absolute;inset:12px;border:.8px solid var(--accent);opacity:.5;display:none;pointer-events:none;z-index:4}
  body.t-luxe #lframe{display:block}

  /* date stamp (film) */
  #datestamp{position:absolute;top:max(16px,env(safe-area-inset-top));right:20px;z-index:6;
    font-family:"Courier New",monospace;color:#ffb03b;font-size:14px;letter-spacing:1px;display:none;
    text-shadow:0 1px 2px rgba(0,0,0,.6)}
  body.t-film #datestamp{display:block}

  #top{position:absolute;top:0;left:0;right:0;padding:max(14px,env(safe-area-inset-top)) 16px 14px;
    display:flex;align-items:center;gap:9px;z-index:6;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent)}
  .brand{font-weight:800;font-size:17px;letter-spacing:-.4px;font-family:var(--brand-font)}
  .brand b{color:var(--accent)}
  body.t-luxe .brand{letter-spacing:2px;font-weight:600;font-size:15px}
  .top-sp{flex:1}
  .ic{width:40px;height:40px;border-radius:50%;background:rgba(20,20,26,.5);
    border:1px solid rgba(255,255,255,.16);display:grid;place-items:center;
    backdrop-filter:blur(6px);cursor:pointer;font-size:17px;color:#fff}
  .ic.on{background:var(--accent);border-color:var(--accent);color:#111}

  /* theme switch */
  #themes{position:absolute;left:0;right:0;z-index:6;display:flex;gap:7px;justify-content:center;
    top:calc(max(14px,env(safe-area-inset-top)) + 50px)}
  .tbtn{padding:6px 13px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;
    background:rgba(20,20,26,.5);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(6px);color:#fff}
  .tbtn.on{background:var(--accent);color:#111;border-color:var(--accent)}

  #poseTag{position:absolute;left:50%;top:calc(max(14px,env(safe-area-inset-top)) + 92px);
    transform:translateX(-50%);z-index:6;display:flex;flex-direction:column;align-items:center;gap:4px;
    pointer-events:none;text-align:center;width:86%}
  #poseName{background:rgba(14,14,18,.5);backdrop-filter:blur(6px);padding:5px 14px;border-radius:999px;
    font-weight:700;font-size:14px;border:1px solid rgba(255,255,255,.14);font-family:var(--label-font)}
  #poseTip{font-size:12px;color:rgba(255,255,255,.66);font-weight:500;text-shadow:0 1px 3px rgba(0,0,0,.6);line-height:1.4}

  #cats{position:absolute;left:0;right:0;bottom:calc(170px + env(safe-area-inset-bottom));z-index:6;
    display:flex;gap:8px;overflow-x:auto;padding:0 16px;scrollbar-width:none}
  #cats::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;padding:8px 15px;border-radius:var(--chip-radius);font-size:13px;font-weight:700;
    background:var(--chipoff-bg);border:1px solid rgba(255,255,255,.16);color:var(--chipoff-fg);
    backdrop-filter:blur(6px);cursor:pointer;white-space:nowrap;transition:.15s;font-family:var(--label-font)}
  .chip.on{background:var(--chipon-bg);color:var(--chipon-fg);border-color:var(--accent)}
  body.t-luxe .chip{border:none;border-bottom:1.5px solid transparent;border-radius:0;backdrop-filter:none;background:transparent}
  body.t-luxe .chip.on{border-bottom-color:var(--accent);background:transparent}

  #strip{position:absolute;left:0;right:0;bottom:calc(108px + env(safe-area-inset-bottom));z-index:6;
    display:flex;gap:9px;overflow-x:auto;padding:0 16px;scrollbar-width:none}
  #strip::-webkit-scrollbar{display:none}
  .pcard{flex:0 0 auto;width:46px;height:54px;border-radius:12px;cursor:pointer;
    background:rgba(20,20,26,.5);border:1px solid rgba(255,255,255,.16);
    backdrop-filter:blur(6px);display:grid;place-items:center;transition:.15s;padding:4px}
  body.t-film .pcard{border-radius:5px}
  body.t-luxe .pcard{border-radius:2px}
  .pcard svg{width:100%;height:100%}
  .pcard.on{border-color:var(--accent);background:var(--fillcol);box-shadow:0 0 0 1px var(--accent)}

  #ctrls{position:absolute;left:0;right:0;bottom:0;z-index:7;padding:0 26px calc(20px + env(safe-area-inset-bottom));
    height:calc(96px + env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(to top,rgba(0,0,0,.5),transparent)}
  .side{width:50px;height:50px;border-radius:50%;background:rgba(20,20,26,.55);
    border:1px solid rgba(255,255,255,.18);display:grid;place-items:center;backdrop-filter:blur(6px);cursor:pointer;font-size:20px;color:#fff}
  #shutter{width:74px;height:74px;border-radius:50%;border:5px solid var(--shutter-ring);
    background:var(--shutter);cursor:pointer;position:relative;transition:transform .08s}
  #shutter:active{transform:scale(.92)}
  body.t-luxe #shutter{border-width:2px;background:transparent}
  body.t-luxe #shutter::after{content:"";position:absolute;inset:8px;border-radius:50%;background:var(--accent)}

  #sheet{position:absolute;inset:0;z-index:20;background:rgba(0,0,0,.78);display:none;
    flex-direction:column;justify-content:flex-end;backdrop-filter:blur(4px)}
  #sheet.show{display:flex}
  .sheet-in{background:#15151b;border-radius:24px 24px 0 0;padding:18px 18px calc(22px + env(safe-area-inset-bottom));
    max-height:88vh;display:flex;flex-direction:column;gap:14px}
  .sheet-grip{width:38px;height:4px;border-radius:99px;background:#3a3a44;margin:0 auto}
  #shot{width:100%;border-radius:16px;object-fit:contain;max-height:58vh;background:#000}
  .sheet-row{display:flex;gap:10px}
  .btn{flex:1;padding:15px;border-radius:14px;font-size:15px;font-weight:800;border:none;cursor:pointer}
  .btn.g{background:var(--accent);color:#111}
  .btn.o{background:#26262e;color:#fff}

  #intro{position:absolute;inset:0;z-index:40;background:#0E0E12;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;padding:32px;text-align:center}
  #intro.hide{display:none}
  .i-logo{font-size:30px;font-weight:900;letter-spacing:-1px}
  .i-logo b{color:var(--accent)}
  .i-sub{color:rgba(255,255,255,.66);font-size:15px;line-height:1.7;font-weight:500}
  .i-demo{width:118px;height:150px;margin:4px 0}
  #intro .btn.g{max-width:240px;width:100%;color:#111}

  .err{position:absolute;inset:0;z-index:30;display:none;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;padding:34px;text-align:center;background:#0E0E12}
  .err.show{display:flex}
  .err p{color:rgba(255,255,255,.66);font-size:14.5px;line-height:1.6}
  .err .btn{flex:0 0 auto;width:100%;max-width:220px;color:#111}
  .err .hint{margin-top:6px;font-size:12.5px;color:#7a7a86;line-height:1.6;background:#18181f;
    border:1px solid #26262e;border-radius:12px;padding:12px 14px;max-width:300px}
  .err .hint b{color:var(--accent)}
</style>
</head>
<body class="t-film">

<div id="stage">
  <video id="cam" autoplay playsinline muted></video>
  <div id="tint"></div>
  <svg id="overlay" viewBox="0 0 100 130" preserveAspectRatio="xMidYMid slice"></svg>
  <div id="sprocketL"></div><div id="sprocketR"></div>
  <div id="lframe"></div>
  <div id="flash"></div>
</div>

<div id="datestamp">2026.06.29</div>

<div id="top">
  <div class="brand" id="brand">포즈<b>따라</b></div>
  <div class="top-sp"></div>
  <div class="ic" id="gridBtn" title="격자">⊞</div>
  <div class="ic" id="levelBtn" title="수평">◇</div>
  <div class="ic" id="fillBtn" title="채움">◐</div>
  <div class="ic" id="flipPose" title="좌우반전">⇄</div>
</div>

<div id="themes">
  <div class="tbtn on" data-t="t-film">필름</div>
  <div class="tbtn" data-t="t-mz">MZ</div>
  <div class="tbtn" data-t="t-luxe">고급</div>
</div>

<div id="poseTag">
  <div id="poseName">전신 풀샷</div>
  <div id="poseTip">점선에 몸을 맞춰 서보세요</div>
</div>

<div id="cats"></div>
<div id="strip"></div>

<div id="ctrls">
  <div class="side" id="sizeBtn" title="크기">⤢</div>
  <button id="shutter" aria-label="촬영"></button>
  <div class="side" id="camFlip" title="카메라전환">⟲</div>
</div>

<div id="sheet">
  <div class="sheet-in">
    <div class="sheet-grip"></div>
    <img id="shot" alt="촬영 결과">
    <div class="sheet-row">
      <button class="btn o" id="retake">다시 찍기</button>
      <button class="btn g" id="save">저장하기</button>
    </div>
  </div>
</div>

<div id="intro">
  <div class="i-logo">포즈<b>따라</b></div>
  <svg class="i-demo" viewBox="0 0 100 130"></svg>
  <div class="i-sub">점선 가이드에 몸을 맞추면<br>누구나 인생샷.<br>유행 포즈, 그냥 따라만 하세요.</div>
  <button class="btn g" id="startBtn">카메라 켜기</button>
</div>

<div class="err" id="err">
  <div style="font-size:34px">📷</div>
  <div style="font-weight:800;font-size:17px" id="errTitle">카메라를 켤 수 없어요</div>
  <p id="errDesc">설정에서 카메라 권한을 허용한 뒤<br>다시 들어와 주세요.</p>
  <div class="hint" id="errHint" style="display:none"></div>
  <button class="btn g" id="retry">다시 시도</button>
</div>

  add('sL','eL'); add('eL','hL'); add('sR','eR'); add('eR','hR');
  add('hip','hpL'); add('hip','hpR'); add('hpL','kL'); add('kL','fL'); add('hpR','kR'); add('kR','fR');
  return L;
}

const CATS=['혼자','셀카','커플','단체','여행'];
let curCat='혼자', curPose=POSES[0], flip=false, sizeStep=0, fillOn=true;
const SIZES=[0.74,0.9,0.6];
let facing='environment', stream=null;
let gridOn=false, levelOn=false;

const $=s=>document.querySelector(s);
const overlay=$('#overlay'), cam=$('#cam');

function svgForPose(p, dash=true, color='#fff', strokeW=1.1, withFill=false){
  let inner='';
  const scale=SIZES[sizeStep]; const cx=50;
  p.figs.forEach(j=>{
    const tx=v=> flip ? (cx*2 - v) : v;
    const sc=(x,y)=>[ cx + (tx(x)-cx)*scale, 65 + (y-65)*scale ];
    // fill underlay (반투명 채움) — 두꺼운 선 + 머리 채움
    if(withFill){
      const fc=getComputedStyle(document.body).getPropertyValue('--fillcol').trim()||'rgba(255,255,255,.15)';
      const hd=j.head; const [hx,hy]=sc(hd[0],hd[1]);
      inner+=`<circle cx="${hx.toFixed(1)}" cy="${hy.toFixed(1)}" r="${(hd[2]*scale*0.82).toFixed(1)}" fill="${fc}" stroke="none"/>`;
      figurePaths(j).forEach(b=>{ const [x1,y1]=sc(b[0],b[1]); const [x2,y2]=sc(b[2],b[3]);
        inner+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${fc}" stroke-width="${(strokeW*2.6).toFixed(1)}" stroke-linecap="round"/>`; });
    }
    const hd=j.head; const [hx,hy]=sc(hd[0],hd[1]);
    inner+=`<circle cx="${hx.toFixed(1)}" cy="${hy.toFixed(1)}" r="${(hd[2]*scale).toFixed(1)}" fill="none" stroke="${color}" stroke-width="${strokeW}" ${dash?'stroke-dasharray="3 2.4"':''}/>`;
    figurePaths(j).forEach(b=>{ const [x1,y1]=sc(b[0],b[1]); const [x2,y2]=sc(b[2],b[3]);
      inner+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${color}" stroke-width="${strokeW}" stroke-linecap="round" ${dash?'stroke-dasharray="3 2.4"':''}/>`; });
    ['hL','hR','fL','fR'].forEach(k=>{ if(j[k]){const[px,py]=sc(j[k][0],j[k][1]);
      inner+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="${(1.1*scale).toFixed(1)}" fill="${color}"/>`; }});
  });
  return inner;
}

function renderOverlay(){
  let g='';
  if(gridOn){
    g+=`<g stroke="rgba(255,255,255,.3)" stroke-width=".5"><line x1="33.3" y1="0" x2="33.3" y2="130"/>`+
       `<line x1="66.6" y1="0" x2="66.6" y2="130"/><line x1="0" y1="43.3" x2="100" y2="43.3"/>`+
       `<line x1="0" y1="86.6" x2="100" y2="86.6"/></g>`;
  }
  const dashCol=getComputedStyle(document.body).getPropertyValue('--dash').trim()||'#fff';
  if(fillOn) g+=`<g>`+ svgForPose(curPose,false,'transparent',1.1,true) +`</g>`;
  g+=`<g opacity=".85">`+ svgForPose(curPose,true,'rgba(0,0,0,.5)',2.0,false) +`</g>`;
  g+=`<g>`+ svgForPose(curPose,true,dashCol,1.1,false) +`</g>`;
  overlay.innerHTML=g;
}

function thumbSVG(p){
  const sf=flip, ss=sizeStep; flip=false; sizeStep=0;
  const inner=svgForPose(p,false,'#fff',2.4,false);
  flip=sf; sizeStep=ss;
  return `<svg viewBox="10 5 80 120" preserveAspectRatio="xMidYMid meet">${inner}</svg>`;
}

function buildCats(){
  $('#cats').innerHTML=CATS.map(c=>`<div class="chip ${c===curCat?'on':''}" data-c="${c}">${c}</div>`).join('');
  $('#cats').querySelectorAll('.chip').forEach(el=>el.onclick=()=>{
    curCat=el.dataset.c; curPose=POSES.find(p=>p.cat===curCat);
    buildCats(); buildStrip(); selectPose(curPose);
  });
}
function buildStrip(){
  const list=POSES.filter(p=>p.cat===curCat);
  $('#strip').innerHTML=list.map(p=>`<div class="pcard ${p.id===curPose.id?'on':''}" data-id="${p.id}">${thumbSVG(p)}</div>`).join('');
  $('#strip').querySelectorAll('.pcard').forEach(el=>el.onclick=()=>selectPose(POSES.find(x=>x.id===el.dataset.id)));
}
function selectPose(p){
  curPose=p;
  $('#poseName').textContent=p.name; $('#poseTip').textContent=p.tip;
  $('#strip').querySelectorAll('.pcard').forEach(el=>el.classList.toggle('on',el.dataset.id===p.id));
  renderOverlay();
}

/* 테마 전환 */
$('#themes').querySelectorAll('.tbtn').forEach(el=>el.onclick=()=>{
  document.body.className=el.dataset.t;
  $('#themes').querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('on',b===el));
  buildStrip(); renderOverlay(); introDemo();
});

$('#gridBtn').onclick=()=>{ gridOn=!gridOn; $('#gridBtn').classList.toggle('on',gridOn); renderOverlay(); };
$('#levelBtn').onclick=()=>{ levelOn=!levelOn; $('#levelBtn').classList.toggle('on',levelOn);
  $('#level')&&$('#level').classList.toggle('show',levelOn); if(levelOn) ensureOrientation(); };
$('#fillBtn').onclick=()=>{ fillOn=!fillOn; $('#fillBtn').classList.toggle('on',fillOn); renderOverlay(); };
$('#flipPose').onclick=()=>{ flip=!flip; renderOverlay(); };
$('#sizeBtn').onclick=()=>{ sizeStep=(sizeStep+1)%SIZES.length; renderOverlay(); };

function ensureOrientation(){
  if(typeof DeviceOrientationEvent!=='undefined' && DeviceOrientationEvent.requestPermission){
    DeviceOrientationEvent.requestPermission().catch(()=>{});
  }
}

async function startCam(){
  $('#err').classList.remove('show');
  if(!window.isSecureContext && location.protocol!=='http:'){ showCamError(true); return; }
  try{
    if(stream) stream.getTracks().forEach(t=>t.stop());
    stream=await navigator.mediaDevices.getUserMedia({ video:{facingMode:facing,width:{ideal:1920},height:{ideal:1080}}, audio:false });
    cam.srcObject=stream; cam.classList.toggle('mirror', facing==='user');
  }catch(err){ showCamError(!window.isSecureContext); }
}
function showCamError(insecure){
  const hint=$('#errHint');
  if(insecure){
    $('#errTitle').textContent='이렇게 열면 카메라가 안 돼요';
    $('#errDesc').innerHTML='파일을 직접 열면 보안상<br>카메라를 켤 수 없어요.';
    hint.style.display='block';
    hint.innerHTML='<b>https 주소</b>로 열어야 작동해요.<br>토스 앱 안에서는 정상 작동하고,<br>테스트는 GitHub Pages 같은<br>https 주소에 올려서 열어주세요.';
  }else{
    $('#errTitle').textContent='카메라를 켤 수 없어요';
    $('#errDesc').innerHTML='설정에서 카메라 권한을 허용한 뒤<br>다시 들어와 주세요.';
    hint.style.display='none';
  }
  $('#err').classList.add('show');
}
$('#camFlip').onclick=()=>{ facing=facing==='user'?'environment':'user'; startCam(); };
$('#retry').onclick=startCam;

$('#shutter').onclick=()=>{
  if(!stream) return;
  const v=cam, c=document.createElement('canvas');
  const vw=v.videoWidth||1080, vh=v.videoHeight||1920;
  c.width=vw; c.height=vh; const ctx=c.getContext('2d');
  if(facing==='user'){ ctx.translate(vw,0); ctx.scale(-1,1); }
  ctx.drawImage(v,0,0,vw,vh);
  if(document.body.classList.contains('t-film')){ ctx.setTransform(1,0,0,1,0,0); ctx.fillStyle='rgba(120,84,30,.18)'; ctx.fillRect(0,0,vw,vh); }
  const data=c.toDataURL('image/jpeg',0.92);
  $('#shot').src=data; lastShot=data;
  const fl=$('#flash'); fl.style.transition='none'; fl.style.opacity='.85';
  requestAnimationFrame(()=>{ fl.style.transition='opacity .4s'; fl.style.opacity='0'; });
  setTimeout(()=>$('#sheet').classList.add('show'),140);
};
let lastShot=null;
$('#retake').onclick=()=>$('#sheet').classList.remove('show');
$('#save').onclick=()=>{
  if(!lastShot) return;
  const base64=lastShot.split(',')[1];
  try{
    if(window.ReactNativeWebView){ window.ReactNativeWebView.postMessage(JSON.stringify({type:'SAVE_IMAGE',data:base64})); }
    else if(window.parent && window.parent!==window){ window.parent.postMessage(JSON.stringify({type:'SAVE_IMAGE',data:base64}),'*'); }
    else{ const a=document.createElement('a'); a.href=lastShot; a.download='포즈따라_'+Date.now()+'.jpg'; a.click(); }
  }catch(e){ const a=document.createElement('a'); a.href=lastShot; a.download='posecam_'+Date.now()+'.jpg'; a.click(); }
  $('#sheet').classList.remove('show');
};
window.addEventListener('message',ev=>{ try{ const m=typeof ev.data==='string'?JSON.parse(ev.data):ev.data;
  if(m&&m.type==='SAVE_RESULT'){} }catch(e){} });
window.addEventListener('deviceorientation',e=>{ if(!levelOn) return; });

function introDemo(){
  const demo=document.querySelector('#intro .i-demo');
  const sf=flip, ss=sizeStep; flip=false; sizeStep=0;
  const ac=getComputedStyle(document.body).getPropertyValue('--accent').trim()||'#FF2E63';
  demo.innerHTML=svgForPose(POSES[0],true,ac,2.0,false);
  flip=sf; sizeStep=ss;
}

$('#startBtn').onclick=async()=>{ $('#intro').classList.add('hide'); ensureOrientation(); await startCam(); };

buildCats(); buildStrip(); selectPose(POSES[0]); introDemo();
</script>
