<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>시원한 여름나기 v0.6</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
  body { background: #EEF4F6; overflow: hidden; }

  :root {
    --primary: #0F9CB5;
    --primary-dark: #0B7A8F;
    --primary-light: #6FD6E4;
    --ink: #1B2B30;
    --sub: #6A828A;
    --line: #E4EBEE;
    --shadow: 0 4px 16px rgba(20,40,50,.12);
    --shadow-lg: 0 12px 36px rgba(20,40,50,.16);
  }

  #app {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 16px 12px calc(14px + env(safe-area-inset-bottom));
    gap: 12px;
  }

  /* ===== 앱 헤더 ===== */
  #appHeader { flex-shrink: 0; padding: 2px 6px; }
  #appHeader .sub { font-size: 13px; font-weight: 700; color: var(--primary-dark); letter-spacing: .3px; }
  #appHeader .main { font-size: 26px; font-weight: 900; color: var(--ink); margin-top: 2px; letter-spacing: -.5px; }

  /* ===== 필터 칩 ===== */
  #filters { flex-shrink: 0; display: flex; gap: 8px; padding: 0 4px; }
  .chip {
    flex: 1; padding: 11px 8px; border-radius: 14px; border: 1.5px solid var(--line);
    background: #fff; color: var(--sub); font-size: 15px; font-weight: 800;
    display: flex; align-items: center; justify-content: center; gap: 5px; cursor: pointer;
    transition: all .15s;
  }
  .chip.on { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: var(--shadow); }
  .chip .e { font-size: 15px; }

  /* ===== 지도 카드 ===== */
  #card {
    position: relative; flex: 1; min-height: 0;
    display: flex; flex-direction: column;
    background: #fff; border: 1px solid var(--line);
    border-radius: 22px; box-shadow: var(--shadow-lg); overflow: hidden;
  }
  #header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 18px; flex-shrink: 0;
    border-bottom: 1px solid var(--line); background: #fff; z-index: 6;
  }
  #header .mapico { display: flex; align-items: center; }
  #header .htxt { font-size: 18px; font-weight: 800; color: var(--ink); }

  #mapWrap { position: relative; flex: 1; min-height: 0; background: #D6EEF3; }
  #map { width: 100%; height: 100%; }

  #nokey {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 30px; text-align: center; color: var(--sub); background: #E8F7FA;
  }
  #nokey .big { font-size: 40px; }
  #nokey .t { font-size: 15px; font-weight: 700; line-height: 1.55; color: var(--ink); }
  #nokey .s { font-size: 13px; font-weight: 600; line-height: 1.55; }
  #nokey code { background:#fff; padding:2px 6px; border-radius:8px; color:var(--primary-dark); font-weight:700; }

  #binoc {
    position: absolute; right: 16px; top: 16px; z-index: 15;
    width: 50px; height: 50px; border-radius: 50%;
    background: #1B2B30; border: none; box-shadow: 0 6px 18px rgba(0,0,0,.28);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  #binoc:active { transform: scale(.94); }
  #gps {
    position: absolute; right: 16px; top: 74px; z-index: 15;
    width: 46px; height: 46px; border-radius: 50%;
    background: #fff; border: none; box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 700; line-height: 1; color: var(--primary); cursor: pointer;
  }
  #gps:active { transform: scale(.94); }

  /* ===== 하단 겹치는 식당 카드 ===== */
  #cards {
    position: absolute; left: 0; right: 0; bottom: 14px; z-index: 15;
    display: flex; gap: 12px;
    overflow-x: auto; overflow-y: hidden;
    scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
    padding: 0 16px; scrollbar-width: none;
  }
  #cards::-webkit-scrollbar { display: none; }

  .rest {
    scroll-snap-align: center;
    flex: 0 0 calc(100% - 44px);
    background: #fff; border-radius: 18px;
    box-shadow: 0 8px 26px rgba(20,40,50,.20);
    padding: 14px 16px; display: flex; align-items: center; gap: 14px;
  }
  .thumb {
    width: 60px; height: 60px; border-radius: 14px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--primary-light), var(--primary));
    display: flex; align-items: center; justify-content: center; font-size: 30px;
  }
  .info { flex: 1; min-width: 0; }
  .nameRow { display: flex; align-items: baseline; gap: 8px; }
  .name { font-size: 18px; font-weight: 800; color: var(--ink);
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  .km { font-size: 15px; font-weight: 800; color: var(--primary-dark); flex-shrink: 0; }
  .travel { margin-top: 6px; display: flex; flex-direction: column; gap: 3px; }
  .tline { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 700; color: var(--ink); }
  .tline .lb { color: var(--sub); font-weight: 600; }
  .dish { display: inline-block; margin-top: 8px; padding: 3px 9px; border-radius: 9px;
          background: #E0F5F8; color: var(--primary-dark); font-size: 12.5px; font-weight: 700; }
  .go {
    flex-shrink: 0; width: 44px; height: 44px; border-radius: 12px; border: none;
    background: var(--primary); color: #fff; font-size: 20px; font-weight: 800; cursor: pointer;
  }
  .go:active { background: var(--primary-dark); }

  /* 빈 상태 (무더위쉼터 데이터 없음) */
  .empty {
    scroll-snap-align: center; flex: 0 0 calc(100% - 44px);
    background: #fff; border-radius: 18px; box-shadow: 0 8px 26px rgba(20,40,50,.20);
    padding: 22px 18px; text-align: center;
  }
  .empty .et { font-size: 15px; font-weight: 800; color: var(--ink); }
  .empty .es { font-size: 13px; font-weight: 600; color: var(--sub); margin-top: 6px; line-height: 1.5; }
</style>
</head>
<body>
<div id="app">
  <div id="appHeader">
    <div class="sub">🧊 거제 여름 지도</div>
    <div class="main">시원한 여름나기</div>
  </div>

  <div id="filters">
    <button class="chip on" data-f="냉음식"><span class="e">🍜</span>냉음식</button>
    <button class="chip" data-f="냉면"><span class="e">🥶</span>냉면</button>
    <button class="chip" data-f="무더위쉼터"><span class="e">🏠</span>무더위쉼터</button>
  </div>

  <div id="card">
    <div id="header">
      <span class="mapico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1B2B30" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 8 3 16 6 23 3 23 18 16 21 8 18 1 21 1 6"></polygon><line x1="8" y1="3" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="21"></line></svg></span>
      <span class="htxt" id="cardTitle">거제 냉면 맛집</span>
    </div>
    <div id="mapWrap">
      <div id="map"></div>
      <button id="binoc" title="전체 보기"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M7 5.5h3l1 2v7a2.5 2.5 0 0 1-5 0v-6.5a2 2 0 0 1 0-2.5z"></path><path d="M17 5.5h-3l-1 2v7a2.5 2.5 0 0 0 5 0v-6.5a2 2 0 0 0 0-2.5z"></path><line x1="11" y1="11" x2="13" y2="11"></line></svg></button>
      <button id="gps" title="내 위치">◎</button>
      <div id="nokey">
        <div class="big">🗺️</div>
        <div class="t">카카오맵 키를 넣어주세요</div>
        <div class="s">JavaScript 키를 <code>KAKAO_KEY</code>에 입력</div>
      </div>
      <div id="cards"></div>
    </div>
  </div>
</div>

<script>
/* =========================================================
   시원한 여름나기 v0.6
   - 앱 헤더 + 필터 3개(냉음식/냉면/무더위쉼터)
   - 카드: 이름+km(우측) / 차량·도보 각 줄 / 종류 태그
   ========================================================= */
  const KAKAO_KEY = 'b2e63e83f6f056f7c4d525b8b503b686';

  const PLACES = [
    { name:'고메밀면 아주점', lat:34.8675089, lng:128.6891044, dish:'밀면', icon:'🍜', addr:'아주1로4길 21', cat:['냉음식'] },
    { name:'거제명가',       lat:34.867917,  lng:128.6793342, dish:'냉면', icon:'🍜', addr:'아주1로 64', cat:['냉음식','냉면'] },
    { name:'아라가야 냉면 학동점', lat:34.83338, lng:128.7013059, dish:'냉면·갈비탕', icon:'🥶', addr:'지세포해안로 40', cat:['냉음식','냉면'] },
    { name:'거제냉밀면',     lat:34.8881026, lng:128.6227077, dish:'물밀면', icon:'❄️', addr:'고현동', cat:['냉음식'] },
    { name:'거제촌국수',     lat:34.9094075, lng:128.5459043, dish:'콩국수·냉국수', icon:'🥣', addr:'사등리', cat:['냉음식'] },
  ];
  // 무더위쉼터 데이터 (공공데이터포털에서 추가 예정)
  const SHELTERS = [];

  const $ = id => document.getElementById(id);
  let map, myMarker, markers = [], curIdx = -1, myLoc = null;
  let filter = '냉음식', list = [];

  // 거리·시간
  function distKm(a,b,c,d){const R=6371,r=x=>x*Math.PI/180;const dLat=r(c-a),dLng=r(d-b);
    const t=Math.sin(dLat/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dLng/2)**2;
    return R*2*Math.atan2(Math.sqrt(t),Math.sqrt(1-t));}
  function estCar(km){return Math.max(1,Math.round(km*1.3/40*60));}
  function estWalk(km){return Math.max(1,Math.round(km*1.2/4*60));}
  function fmtMin(m){return m>=60?Math.floor(m/60)+'시간 '+(m%60)+'분':m+'분';}
  function fmtDist(km){return km<1?Math.round(km*1000)+'m':km.toFixed(1)+'km';}

  const CAR_SVG='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0B7A8F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l1.5-4.5A2 2 0 0 1 8.4 7h7.2a2 2 0 0 1 1.9 1.5L19 13"></path><path d="M5 13h14v4a1 1 0 0 1-1 1h-1a1 1 0 0 1-1-1v-1H8v1a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-4z"></path><circle cx="7.5" cy="15.5" r="1"></circle><circle cx="16.5" cy="15.5" r="1"></circle></svg>';
  const WALK_SVG='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6A828A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13" cy="4" r="1.6"></circle><path d="M13 7l-2 4 3 2 1 5"></path><path d="M11 11l-3 1-2 4"></path><path d="M14 13l3 1"></path></svg>';

  function pinImage(color){
    const svg='<svg xmlns="http://www.w3.org/2000/svg" width="34" height="44" viewBox="0 0 34 44">'+
      '<path d="M17 0C8 0 1 7 1 16c0 11 16 28 16 28s16-17 16-28C33 7 26 0 17 0z" fill="'+color+'" stroke="#fff" stroke-width="2"/>'+
      '<circle cx="17" cy="16" r="6" fill="#fff"/></svg>';
    return new kakao.maps.MarkerImage('data:image/svg+xml;base64,'+btoa(svg),
      new kakao.maps.Size(34,44),{offset:new kakao.maps.Point(17,44)});
  }
  let RED, BLUE;

  function boot(){
    if(!KAKAO_KEY) return;
    const s=document.createElement('script');
    s.src='//dapi.kakao.com/v2/maps/sdk.js?autoload=false&appkey='+KAKAO_KEY;
    s.onload=()=>kakao.maps.load(initMap);
    document.head.appendChild(s);
  }

  function initMap(){
    $('nokey').style.display='none';
    map=new kakao.maps.Map($('map'),{center:new kakao.maps.LatLng(34.876,128.692),level:8});
    RED=pinImage('#E63946'); BLUE=pinImage('#2563EB');
    render();
    locate(true);
  }

  // 필터별 목록 그리기
  function render(){
    // 마커 제거
    markers.forEach(m=>m.setMap(null)); markers=[]; curIdx=-1;
    list = (filter==='무더위쉼터') ? SHELTERS : PLACES.filter(p=>p.cat.includes(filter));

    // 헤더 타이틀
    $('cardTitle').textContent =
      filter==='냉면' ? '거제 냉면 맛집' :
      filter==='무더위쉼터' ? '거제 무더위쉼터' : '거제 냉음식 맛집';

    // 마커
    list.forEach((p,i)=>{
      const m=new kakao.maps.Marker({map,position:new kakao.maps.LatLng(p.lat,p.lng),title:p.name,image:RED});
      kakao.maps.event.addListener(m,'click',()=>focusPlace(i,true));
      markers.push(m);
    });

    buildCards();
    if(list.length) fitAll();
  }

  function buildCards(){
    const wrap=$('cards'); wrap.innerHTML='';
    if(!list.length){
      wrap.innerHTML='<div class="empty"><div class="et">🏠 무더위쉼터 준비 중</div>'+
        '<div class="es">공공데이터를 연동해<br>곧 추가할 예정이에요</div></div>';
      return;
    }
    list.forEach((p,i)=>{
      const c=document.createElement('div');
      c.className='rest'; c.dataset.idx=i;
      c.innerHTML=
        '<div class="thumb">'+p.icon+'</div>'+
        '<div class="info">'+
          '<div class="nameRow"><div class="name">'+p.name+'</div><div class="km" data-km="'+i+'">–</div></div>'+
          '<div class="travel" data-tidx="'+i+'"><div class="tline lb">📍 위치 확인 중…</div></div>'+
          '<div class="dish">🧊 '+p.dish+'</div>'+
        '</div>'+
        '<button class="go" title="길찾기">→</button>';
      c.querySelector('.go').onclick=e=>{e.stopPropagation();openKakao(p);};
      wrap.appendChild(c);
    });
    let t;
    wrap.addEventListener('scroll',()=>{clearTimeout(t);t=setTimeout(()=>{
      const el=wrap.querySelector('.rest'); if(!el) return;
      const idx=Math.round(wrap.scrollLeft/(el.offsetWidth+12));
      if(idx!==curIdx) focusPlace(idx,false);
    },90);});
    updateTravel();
  }

  function updateTravel(){
    if(!myLoc) return;
    document.querySelectorAll('.travel').forEach(el=>{
      const p=list[+el.dataset.tidx]; if(!p) return;
      const km=distKm(myLoc.lat,myLoc.lng,p.lat,p.lng);
      el.innerHTML=
        '<div class="tline">'+CAR_SVG+'<span class="lb">차량</span> '+fmtMin(estCar(km))+'</div>'+
        '<div class="tline">'+WALK_SVG+'<span class="lb">도보</span> '+fmtMin(estWalk(km))+'</div>';
    });
    document.querySelectorAll('.km').forEach(el=>{
      const p=list[+el.dataset.km]; if(!p) return;
      el.textContent=fmtDist(distKm(myLoc.lat,myLoc.lng,p.lat,p.lng));
    });
  }

  function focusPlace(i,scrollCard){
    if(i<0||i>=list.length) return;
    if(curIdx>=0&&markers[curIdx]) markers[curIdx].setImage(RED);
    curIdx=i; markers[i].setImage(BLUE);
    const p=list[i];
    map.panTo(new kakao.maps.LatLng(p.lat,p.lng));
    if(scrollCard){
      const wrap=$('cards'), card=wrap.querySelector('.rest[data-idx="'+i+'"]');
      if(card) wrap.scrollTo({left:card.offsetLeft-16,behavior:'smooth'});
    }
  }

  function fitAll(){
    const b=new kakao.maps.LatLngBounds();
    list.forEach(p=>b.extend(new kakao.maps.LatLng(p.lat,p.lng)));
    map.setBounds(b);
  }

  function locate(silent){
    if(!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(pos=>{
      myLoc={lat:pos.coords.latitude,lng:pos.coords.longitude};
      const loc=new kakao.maps.LatLng(myLoc.lat,myLoc.lng);
      if(myMarker) myMarker.setMap(null);
      myMarker=new kakao.maps.Marker({map,position:loc,zIndex:1,
        image:new kakao.maps.MarkerImage('data:image/svg+xml;base64,'+btoa(
          '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"><circle cx="11" cy="11" r="6" fill="#2563EB" stroke="#fff" stroke-width="3"/></svg>'),
          new kakao.maps.Size(22,22),{offset:new kakao.maps.Point(11,11)})});
      if(!silent) map.panTo(loc);
      updateTravel();
    },()=>{},{enableHighAccuracy:true,timeout:8000});
  }

  // 필터 클릭
  document.querySelectorAll('.chip').forEach(ch=>{
    ch.onclick=()=>{
      document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
      ch.classList.add('on');
      filter=ch.dataset.f;
      render();
    };
  });

  $('binoc').onclick=()=>{ if(list.length) fitAll(); };
  $('gps').onclick=()=>locate(false);

  function openKakao(p){
    window.open('https://map.kakao.com/link/to/'+encodeURIComponent(p.name)+','+p.lat+','+p.lng,'_blank');
  }

  boot();
</script>
</body>
</html>
